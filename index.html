<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OSATシミュレーター</title>

    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="icon.png">

</head>


<body>


<div class="container">


    <h1>OSATシミュレーター</h1>



    <!-- =========================
         入力
    ========================== -->

    <div class="card">


        <h2>入力</h2>



        <label for="currentVotes">
            現在の件数
        </label>

        <input
            type="number"
            id="currentVotes"
            min="0"
            placeholder="例：100"
        >



        <label for="currentRate">
            現状のOSAT（%）
        </label>

        <input
            type="number"
            id="currentRate"
            min="0"
            max="100"
            step="0.1"
            placeholder="例：80.0"
        >



        <label for="targetRate">
            目標のOSAT（%）
        </label>

        <input
            type="number"
            id="targetRate"
            min="0"
            max="100"
            step="0.1"
            placeholder="例：85.0"
        >



        <label for="futureVotes">
            今後の回答数
        </label>

        <input
            type="number"
            id="futureVotes"
            min="0"
            placeholder="例：50"
        >



        <label for="futureRate">
            今後の大変満足率（%）
        </label>

        <input
            type="number"
            id="futureRate"
            min="0"
            max="100"
            step="0.1"
            placeholder="例：90.0"
        >




        <div class="button-area">


            <button id="resetButton">
                リセット
            </button>


            <button id="saveButton">
                結果を保存
            </button>


        </div>



    </div>






    <!-- =========================
         結果
    ========================== -->


    <div class="card">


        <h2>計算結果</h2>



        <p>
            <strong>
            判定：
          </strong>

            <span id="resultStatus">
                -
            </span>
        </p>

        <p id="resultReason">
            -
        </p>




        <p>

            <strong>
                現在の大変満足件数：
            </strong>

            <span id="currentCount">
                -
            </span>

        </p>




        <hr>




        <h3>
            入力した大変満足率の場合
        </h3>



        <p>

            最終OSAT：

            <span id="futureResult">
                -
            </span>

        </p>



        <p>

            必要回答数：

            <span id="futureNeed">
                -
            </span>

        </p>





        <hr>





        <h3>
            すべて大変満足だった場合
        </h3>



        <p>

            最終OSAT：

            <span id="allRate">
                -
            </span>

        </p>




        <p>

            必要回答数：

            <span id="allNeed">
                -
            </span>

        </p>



    </div>








    <!-- =========================
         履歴
    ========================== -->


    <div class="card">


        <div class="history-header">


            <h2>
                履歴
            </h2>



            <div class="history-buttons">

                <button id="csvButton">
                    CSV出力
                </button>

                <button id="excelButton">
                    Excel出力
                </button>

                <button id="clearHistoryButton">
                    履歴削除
                </button>

            </div>



        </div>






        <div class="table-wrapper">


            <table id="historyTable">


                <thead>


                    <tr>

                        <th>日時</th>

                        <th>現在件数</th>

                        <th>現状OSAT</th>

                        <th>目標OSAT</th>

                        <th>今後回答</th>

                        <th>今後満足率</th>

                        <th>予測OSAT</th>

                        <th>予測必要件数</th>

                        <th>100%OSAT</th>

                        <th>100%必要件数</th>

                        <th>読込</th>

                    </tr>


                </thead>



                <tbody id="historyBody">


                </tbody>



            </table>


        </div>



    </div>




</div>




<script src="script.js"></script>


</body>


</html>
